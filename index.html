<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ритмика — отработка паттернов</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  font-size: 2rem;
  margin-bottom: 8px;
  color: #00d2ff;
}

h2 {
  font-size: 1.3rem;
  margin: 30px 0 15px;
  color: #00d2ff;
  border-bottom: 1px solid #2a2a4e;
  padding-bottom: 8px;
}

.subtitle {
  text-align: center;
  color: #888;
  margin-bottom: 20px;
  font-size: 0.9rem;
}

/* Pattern cards */
.patterns-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

.pattern-card {
  background: #16213e;
  border: 1px solid #2a2a4e;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  transition: transform 0.15s;
}

.pattern-card:hover {
  transform: translateY(-2px);
  border-color: #00d2ff;
}

.pattern-cells {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-bottom: 6px;
}

.cell {
  width: 28px;
  height: 36px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 0.85rem;
}

.cell.sound {
  background: #0f4c75;
  border: 2px solid #00d2ff;
  color: #00d2ff;
}

.cell.rest {
  background: #1a1a2e;
  border: 2px solid #2a2a4e;
  color: #555;
}

.pattern-label {
  font-size: 0.8rem;
  color: #888;
  font-family: 'Courier New', monospace;
}

/* Generator section */
.generator-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}

.btn {
  background: #0f4c75;
  color: #e0e0e0;
  border: 2px solid #00d2ff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}

.btn:hover {
  background: #00d2ff;
  color: #1a1a2e;
}

.btn:active {
  transform: scale(0.97);
}

.btn.regenerate {
  background: #1a1a2e;
  border-color: #555;
  font-size: 0.85rem;
  padding: 8px 16px;
}

/* Generated output */
.output-area {
  background: #16213e;
  border-radius: 12px;
  padding: 24px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.output-empty {
  color: #555;
  text-align: center;
  padding: 30px;
  font-size: 0.95rem;
}

.measure {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.measure-number {
  color: #555;
  font-size: 0.8rem;
  min-width: 40px;
}

.beat-group {
  display: flex;
  gap: 3px;
  padding: 4px 6px;
  border-radius: 6px;
  background: rgba(0, 210, 255, 0.05);
}

.beat-group .cell {
  width: 24px;
  height: 40px;
  font-size: 0.75rem;
}

.measure-divider {
  width: 3px;
  height: 50px;
  background: #00d2ff;
  border-radius: 2px;
  opacity: 0.4;
}

.output-label {
  font-size: 0.85rem;
  color: #00d2ff;
  margin-bottom: -8px;
  font-weight: 600;
}

/* Modal harmony section */
.modal-section {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.mode-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.control-label {
  font-size: 0.9rem;
  color: #888;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tonic-select {
  background: #16213e;
  color: #e0e0e0;
  border: 2px solid #00d2ff;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.95rem;
  cursor: pointer;
  font-family: inherit;
}

.circle-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

#modal-circle svg {
  width: 100%;
  max-width: 340px;
  height: auto;
}

.sector:hover {
  opacity: 0.85;
}

.mode-label {
  font-size: 1.1rem;
  color: #00d2ff;
  font-weight: 600;
  text-align: center;
}

.mode-label .mode-sub {
  display: block;
  font-size: 0.85rem;
  color: #888;
  font-weight: 400;
  margin-top: 2px;
}

.mode-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.btn.mode-btn {
  padding: 8px 14px;
  font-size: 0.85rem;
  background: #16213e;
}

.btn.mode-btn.active {
  background: #00d2ff;
  color: #1a1a2e;
}

.legend {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85rem;
  color: #888;
}

.legend-item .dot {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  display: inline-block;
}

.legend-item .dot.major { background: #0f4c75; border: 2px solid #00d2ff; }
.legend-item .dot.minor { background: #1a5e4a; border: 2px solid #2dd4a8; }
.legend-item .dot.dim { background: #5a2525; border: 2px solid #ff6b6b; }

@media (max-width: 600px) {
  h1 { font-size: 1.5rem; }
  .cell { width: 22px; height: 30px; }
  .beat-group .cell { width: 20px; height: 34px; }
  .measure-divider { height: 42px; }
}
</style>
</head>
<body>

<h1>Ритмика</h1>
<p class="subtitle">ти-ти-та-ти · отработка ритмических паттернов</p>

<h2>Шестнадцатые — 4 на долю</h2>
<div class="patterns-grid" id="sixteenths-grid"></div>

<h2>Триоли — 3 на долю</h2>
<div class="patterns-grid" id="triplets-grid"></div>

<h2>Генератор — 2 такта</h2>
<div class="generator-buttons">
  <button class="btn" onclick="generate('sixteenths')">Случайные шестнадцатые</button>
  <button class="btn" onclick="generate('triplets')">Случайные триоли</button>
  <button class="btn" onclick="generate('mixed')">Шестнадцатые + триоли</button>
</div>
<div class="output-area" id="output">
  <div class="output-empty">Нажмите кнопку, чтобы сгенерировать ритм</div>
</div>

<h2>Модальность — лады и функции аккордов</h2>
<div class="modal-section">
  <div class="mode-controls">
    <label class="control-label">Тоника:
      <select id="tonic-select" class="tonic-select" onchange="selectTonic(this.value)"></select>
    </label>
  </div>
  <div class="circle-container">
    <div id="modal-circle"></div>
    <div class="mode-label" id="mode-label"></div>
  </div>
  <div class="mode-buttons" id="mode-buttons"></div>
  <div class="legend">
    <span class="legend-item"><span class="dot major"></span> Мажор</span>
    <span class="legend-item"><span class="dot minor"></span> Минор</span>
    <span class="legend-item"><span class="dot dim"></span> Уменьшенный</span>
  </div>
</div>

<script>
const SIXTEENTHS = [
  'oxxx', 'ooxx', 'ooox', 'oooo',
  'xxox', 'xxoo', 'xooo', 'xxxx',
  'xoxx', 'xoox', 'xxxo', 'oxox',
  'oxxo', 'oxoo', 'ooxo', 'xoxo'
];

const TRIPLETS = [
  'oxx', 'oox', 'ooo', 'xxx',
  'xoo', 'xxo', 'xox', 'oxo'
];

function createCells(pattern, cellClass) {
  return pattern.split('').map(sym => {
    const isSound = sym === 'o';
    return `<div class="cell ${isSound ? 'sound' : 'rest'}">${sym}</div>`;
  }).join('');
}

function renderPatternGrid(gridId, patterns) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = patterns.map(p =>
    `<div class="pattern-card">
      <div class="pattern-cells">${createCells(p)}</div>
    </div>`
  ).join('');
}

function randomChoice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate(type) {
  const output = document.getElementById('output');
  const beatsPerMeasure = 4;
  const numMeasures = 1;
  let html = '';
  let label = '';

  if (type === 'sixteenths') {
    label = 'Случайные шестнадцатые';
  } else if (type === 'triplets') {
    label = 'Случайные триоли';
  } else {
    label = 'Шестнадцатые + триоли';
  }

  html += `<div class="output-label">${label}</div>`;

  for (let m = 0; m < numMeasures; m++) {
    html += '<div class="measure">';

    for (let b = 0; b < beatsPerMeasure; b++) {
      let pattern;
      if (type === 'sixteenths') {
        pattern = randomChoice(SIXTEENTHS);
      } else if (type === 'triplets') {
        pattern = randomChoice(TRIPLETS);
      } else {
        pattern = Math.random() < 0.5
          ? randomChoice(SIXTEENTHS)
          : randomChoice(TRIPLETS);
      }
      html += `<div class="beat-group">${createCells(pattern)}</div>`;
    }

    html += '</div>';
    if (m < numMeasures - 1) {
      html += '<div class="measure-divider"></div>';
    }
  }

  html += `<div><button class="btn regenerate" onclick="regenerate('${type}')">↻ Обновить</button></div>`;

  output.innerHTML = html;
}

function regenerate(type) {
  generate(type);
}

// ---- Modal harmony ----
const MINOR_NOTES = {
  'C':  ['C','D','Eb','F','G','Ab','Bb'],
  'C#': ['C#','D#','E','F#','G#','A','B'],
  'D':  ['D','E','F','G','A','Bb','C'],
  'Eb': ['Eb','F','Gb','Ab','Bb','Cb','Db'],
  'E':  ['E','F#','G','A','B','C','D'],
  'F':  ['F','G','Ab','Bb','C','Db','Eb'],
  'F#': ['F#','G#','A','B','C#','D','E'],
  'G':  ['G','A','Bb','C','D','Eb','F'],
  'G#': ['G#','A#','B','C#','D#','E','F#'],
  'A':  ['A','B','C','D','E','F','G'],
  'Bb': ['Bb','C','Db','Eb','F','Gb','Ab'],
  'B':  ['B','C#','D','E','F#','G','A']
};

const MINOR_QUALITIES = ['m','dim','M','m','m','M','M'];

const MODES = [
  { rot: 0, name: 'Эолийский',  sub: 'натуральный минор', eng: 'Aeolian' },
  { rot: 1, name: 'Локрийский', sub: '',                  eng: 'Locrian' },
  { rot: 2, name: 'Ионийский',  sub: 'мажор',             eng: 'Ionian' },
  { rot: 3, name: 'Дорийский',  sub: '',                  eng: 'Dorian' },
  { rot: 4, name: 'Фригийский', sub: '',                  eng: 'Phrygian' },
  { rot: 5, name: 'Лидийский',  sub: '',                  eng: 'Lydian' },
  { rot: 6, name: 'Миксолидийский', sub: '',              eng: 'Mixolydian' }
];

const ROMAN = ['I','II','III','IV','V','VI','VII'];

const QUALITY_INFO = {
  'M':   { fill: '#0f4c75', stroke: '#00d2ff' },
  'm':   { fill: '#1a5e4a', stroke: '#2dd4a8' },
  'dim': { fill: '#5a2525', stroke: '#ff6b6b' }
};

const TONIC_ORDER = ['C','C#','D','Eb','E','F','F#','G','G#','A','Bb','B'];

let modalState = { tonic: 'A', rot: 0 };

function chordSymbol(note, qual) {
  if (qual === 'M') return note;
  if (qual === 'm') return note + 'm';
  return note + 'dim';
}

function renderModalCircle() {
  const { tonic, rot } = modalState;
  const notes = MINOR_NOTES[tonic];
  const dispNotes = [];
  const dispQual = [];
  for (let i = 0; i < 7; i++) {
    dispNotes.push(notes[(rot + i) % 7]);
    dispQual.push(MINOR_QUALITIES[(rot + i) % 7]);
  }

  const cx = 150, cy = 150, R = 128;
  const slice = 360 / 7;
  let svg = '<svg viewBox="0 0 300 300" width="100%" style="max-width:340px">';
  for (let i = 0; i < 7; i++) {
    const a0 = (i * slice - 90) * Math.PI / 180;
    const a1 = ((i + 1) * slice - 90) * Math.PI / 180;
    const x0 = (cx + R * Math.cos(a0)).toFixed(2);
    const y0 = (cy + R * Math.sin(a0)).toFixed(2);
    const x1 = (cx + R * Math.cos(a1)).toFixed(2);
    const y1 = (cy + R * Math.sin(a1)).toFixed(2);
    const qi = QUALITY_INFO[dispQual[i]];
    const sw = (i === 0) ? 3.5 : 1.5;
    svg += `<path class="sector" d="M${cx},${cy} L${x0},${y0} A${R},${R} 0 0 1 ${x1},${y1} Z" fill="${qi.fill}" stroke="${qi.stroke}" stroke-width="${sw}" style="cursor:pointer" onclick="selectSector(${i})" />`;
  }
  for (let i = 0; i < 7; i++) {
    const am = ((i + 0.5) * slice - 90) * Math.PI / 180;
    const qi = QUALITY_INFO[dispQual[i]];
    const tr = R * 0.6;
    const tx = cx + tr * Math.cos(am);
    const ty = cy + tr * Math.sin(am);
    svg += `<g style="pointer-events:none">
      <text x="${tx.toFixed(2)}" y="${(ty - 8).toFixed(2)}" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="bold">${ROMAN[i]}</text>
      <text x="${tx.toFixed(2)}" y="${(ty + 11).toFixed(2)}" text-anchor="middle" fill="${qi.stroke}" font-size="15" font-weight="600">${dispNotes[i]}</text>
      <text x="${tx.toFixed(2)}" y="${(ty + 27).toFixed(2)}" text-anchor="middle" fill="#888" font-size="11">${chordSymbol(dispNotes[i], dispQual[i])}</text>
    </g>`;
  }
  svg += '</svg>';
  return svg;
}

function renderModalSection() {
  document.getElementById('modal-circle').innerHTML = renderModalCircle();
  const mode = MODES.find(m => m.rot === modalState.rot);
  const rootNote = MINOR_NOTES[modalState.tonic][modalState.rot];
  const subParts = [rootNote + ' ' + mode.eng];
  if (mode.sub) subParts.push(mode.sub);
  document.getElementById('mode-label').innerHTML =
    `${mode.name} лад<span class="mode-sub">${subParts.join(' · ')}</span>`;
  document.getElementById('mode-buttons').innerHTML = MODES.map(m =>
    `<button class="btn mode-btn ${m.rot === modalState.rot ? 'active' : ''}" onclick="selectMode(${m.rot})">${m.name}</button>`
  ).join('');
}

function selectTonic(t) {
  modalState.tonic = t;
  renderModalSection();
}

function selectMode(rot) {
  modalState.rot = rot;
  renderModalSection();
}

function selectSector(i) {
  modalState.rot = (modalState.rot + i) % 7;
  renderModalSection();
}

document.getElementById('tonic-select').innerHTML = TONIC_ORDER.map(t =>
  `<option value="${t}"${t === modalState.tonic ? ' selected' : ''}>${t} минор</option>`
).join('');

renderModalSection();
// ---- /Modal harmony ----

// Initial render
renderPatternGrid('sixteenths-grid', SIXTEENTHS);
renderPatternGrid('triplets-grid', TRIPLETS);
</script>

</body>
</html>
